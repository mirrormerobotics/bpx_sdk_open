name: Build wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:

jobs:
  build-wheels:
    name: Build ${{ matrix.os }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-2022
          - macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU for Linux aarch64 wheels
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        run: python scripts/build_wheels.py --cibuildwheel --out-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bpx-sdk-open-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
